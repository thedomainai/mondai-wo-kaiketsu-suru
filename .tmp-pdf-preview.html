<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>PDF Preview Export</title>
<style>
  @page { size: 1280px 720px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 1280px; }
  .page {
    width: 1280px;
    height: 720px;
    break-after: page;
    page-break-after: always;
    overflow: hidden;
  }
  .page:last-child {
    break-after: auto;
    page-break-after: auto;
  }
  iframe {
    width: 1280px;
    height: 720px;
    border: 0;
    display: block;
  }
</style>
</head>
<body>

<section class="page"><iframe src="slide_01.html" loading="eager"></iframe></section>
<section class="page"><iframe src="slide_02.html" loading="eager"></iframe></section>
<script>
  window.__PDF_READY__ = false;
  (async () => {
    const frames = Array.from(document.querySelectorAll('iframe'));
    await Promise.all(frames.map((frame) => new Promise((resolve, reject) => {
      frame.addEventListener('load', () => setTimeout(resolve, 50), { once: true });
      frame.addEventListener('error', () => reject(new Error('iframe load failed: ' + frame.src)), { once: true });
    })));
    await Promise.all(frames.map(async (frame) => {
      try {
        const doc = frame.contentDocument;
        if (doc && doc.fonts && doc.fonts.ready) {
          await doc.fonts.ready;
        }
      } catch (error) {
        console.warn(error);
      }
    }));
    await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    window.__PDF_READY__ = true;
  })();
</script>
</body>
</html>
