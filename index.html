<style>

  body {

    height: 100dvh;

  }
  header {
    display: flex;
    align-items: center;

    background: #111;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    gap: 8px;
  }
  header h1 {
    font-size: 12px;

    overflow: hidden;

  }

    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .controls button {
    background: #333;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .controls button:hover { background: #555; }
  .controls button:active { background: #666; }
  .controls button:disabled { opacity: 0.3; cursor: default; }
  .controls span {
    font-size: 12px;
    color: #888;
    min-width: 52px;
    text-align: center;
    white-space: nowrap;
  }
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }
  .sidebar {
    width: 200px;
    background: #111;
    border-right: 1px solid #333;
    overflow-y: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  .sidebar button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: #999;
    padding: 9px 14px;
    font-size: 11px;
    cursor: pointer;
    border-bottom: 1px solid #222;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    line-height: 1.4;
  }
  .sidebar button:hover { background: #222; color: #fff; }
  .sidebar button.active { background: #2a2a2a; color: #fff; border-left: 3px solid #fff; }
  .sidebar button.chapter-agenda { border-top: 1px solid #333; }
  .sidebar button .num { color: #555; margin-right: 6px; font-variant-numeric: tabular-nums; }
  .viewer {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
    min-width: 0;
  }
  .iframe-wrapper {
    position: relative;
    width: 1280px;
    height: 720px;
    transform-origin: center center;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .viewer iframe {
    width: 1280px;
    height: 720px;
    border: none;
    border-radius: 4px;
    display: block;
  }
  .nav-btn {
    position: absolute;
    top: 0;
    width: 80px;
    height: 100%;
    z-index: 90;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0);
    font-size: 32px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn--prev { left: 0; border-radius: 4px 0 0 4px; }
  .nav-btn--next { right: 0; border-radius: 0 4px 4px 0; }
  .iframe-wrapper:hover .nav-btn {
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.15);
  }
  .nav-btn:hover {
    color: rgba(255,255,255,0.9) !important;

  }
  .nav-btn:active { background: rgba(0,0,0,0.5) !important; }
  .nav-btn:disabled { opacity: 0; cursor: default; pointer-events: none; }
  .touch-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: none;
  }
  .mobile-bar {
    display: none;
    align-items: center;
    justify-content: space-between;

    background: #111;
    border-top: 1px solid #333;

    background: rgba(0,0,0,0.6);
    z-index: 200;
  }
  .drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    border-top: 1px solid #333;
    border-radius: 16px 16px 0 0;
    max-height: 65dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  .drawer.open { transform: translateY(0); }
  .drawer-handle {
    width: 36px;
    height: 4px;
    background: #444;
    border-radius: 2px;
    margin: 12px auto 8px;
  }
  .drawer-title {
    padding: 8px 16px 12px;
    font-size: 12px;
    color: #666;

    background: none;
    border: none;
    color: #999;
    padding: 11px 16px;

    cursor: pointer;
    border-bottom: 1px solid #1a1a1a;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    line-height: 1.4;

  .drawer button.active { color: #fff; background: #2a2a2a; border-left: 3px solid #fff; padding-left: 13px; }
  .drawer button .num { color: #555; margin-right: 8px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .mobile-bar { display: flex; }
    .touch-overlay { display: block; }
    header h1 { font-size: 11px; }
    .controls { display: none; }
    .viewer { padding: 8px; }
  }
</style>
</head>

const TOTAL = slides.length;
const deckTitle = slides[0]?.title || 'スライド';
document.getElementById('deckTitle').textContent = `${deckTitle} — 全${TOTAL}スライド`;
document.title = `${deckTitle} - スライドビューワー`;

// Build sidebar
const sidebar = document.getElementById('sidebar');
slides.forEach((s, i) => {
  const btn = document.createElement('button');
  const cls = s.type === 'chapter-agenda' ? 'chapter-agenda' : s.type === 'chapter-title' ? 'chapter-title' : '';
  if (cls) btn.classList.add(cls);
  btn.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span>${s.title}`;
  btn.onclick = () => goTo(i + 1);
  btn.id = `sb-${i+1}`;
  sidebar.appendChild(btn);
});

// Build drawer
const drawer = document.getElementById('drawer');
slides.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span>${s.title}`;
  btn.onclick = () => { goTo(i + 1); closeDrawer(); };
  btn.id = `dr-${i+1}`;
  drawer.appendChild(btn);
});

function goTo(n) {
  current = Math.max(1, Math.min(TOTAL, n));
  document.getElementById('slideFrame').src = slides[current - 1].file;
  document.getElementById('counter').textContent = `${current} / ${TOTAL}`;
  document.getElementById('prevBtn').disabled = current === 1;
  document.getElementById('nextBtn').disabled = current === TOTAL;
  document.getElementById('navPrev').disabled = current === 1;
  document.getElementById('navNext').disabled = current === TOTAL;
  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
  const sbActive = document.getElementById(`sb-${current}`);
  if (sbActive) { sbActive.classList.add('active'); sbActive.scrollIntoView({ block: 'nearest' }); }
  document.getElementById('mCounter').textContent = `${current} / ${TOTAL}`;
  document.getElementById('mTitle').textContent = slides[current-1].title;
  document.getElementById('mPrevBtn').disabled = current === 1;
  document.getElementById('mNextBtn').disabled = current === TOTAL;
  document.querySelectorAll('.drawer button').forEach(b => b.classList.remove('active'));
  const drActive = document.getElementById(`dr-${current}`);
  if (drActive) drActive.classList.add('active');
}

function go(delta) { goTo(current + delta); }

function openDrawer() {
  document.getElementById('drawerOverlay').style.display = 'block';
  const d = document.getElementById('drawer');
  d.style.display = 'block';
  requestAnimationFrame(() => d.classList.add('open'));
  const active = document.getElementById(`dr-${current}`);
  if (active) setTimeout(() => active.scrollIntoView({ block: 'center' }), 350);
}
function closeDrawer() {
  const d = document.getElementById('drawer');
  d.classList.remove('open');
  setTimeout(() => {
    document.getElementById('drawerOverlay').style.display = 'none';
    d.style.display = 'none';
  }, 300);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); go(-1); }
});

let touchStartX = 0, touchStartY = 0;
const overlay = document.getElementById('touchOverlay');
overlay.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
overlay.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) go(1); else go(-1);
  }
}, { passive: true });

function fitIframe() {
  const viewer = document.querySelector('.viewer');
  const wrapper = document.getElementById('iframeWrapper');
  const pad = window.innerWidth <= 768 ? 16 : 32;
  const scaleX = (viewer.clientWidth - pad) / 1280;
  const scaleY = (viewer.clientHeight - pad) / 720;
  const scale = Math.min(scaleX, scaleY, 1);
  wrapper.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', fitIframe);
window.addEventListener('orientationchange', () => setTimeout(fitIframe, 100));

fitIframe();
goTo(1);
</script>
</body>
</html>
