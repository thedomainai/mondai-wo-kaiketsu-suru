<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>Slide Recovery Tool</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #eee; padding: 24px; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  #log { white-space: pre-wrap; line-height: 1.6; }
  .ok { color: #4ade80; }
  .fail { color: #666; }
  .warn { color: #facc15; }
  button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 20px; cursor: pointer; font-size: 14px; margin: 4px; }
  button:hover { background: #555; }
  #status { margin: 12px 0; font-size: 14px; color: #facc15; }
</style>
</head>
<body>
<h1>Slide Recovery Tool</h1>
<div>
  <button onclick="scanAndDownload(1, 80)">Scan slide_01 ~ slide_80</button>
  <button onclick="downloadAll()">Download All Found</button>
</div>
<div id="status"></div>
<div id="log"></div>

<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
const found = {};

function addLog(msg, cls) {
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}

async function tryFetch(url) {
  // Strategy 1: force-cache
  try {
    const r = await fetch(url, { cache: 'force-cache' });
    if (r.ok) { const t = await r.text(); if (t.length > 100) return t; }
  } catch(e) {}

  // Strategy 2: default
  try {
    const r = await fetch(url);
    if (r.ok) { const t = await r.text(); if (t.length > 100) return t; }
  } catch(e) {}

  // Strategy 3: XMLHttpRequest (different caching behavior)
  return new Promise(resolve => {
    try {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onload = () => {
        if (xhr.status === 200 && xhr.responseText.length > 100) {
          resolve(xhr.responseText);
        } else {
          resolve(null);
        }
      };
      xhr.onerror = () => resolve(null);
      xhr.send();
    } catch(e) { resolve(null); }
  });
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/html; charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function scanAndDownload(from, to) {
  log.innerHTML = '';
  let count = 0;
  status.textContent = 'Scanning...';

  for (let i = from; i <= to; i++) {
    const num = String(i).padStart(2, '0');
    const fname = `slide_${num}.html`;
    const content = await tryFetch(fname);
    if (content) {
      found[fname] = content;
      count++;
      addLog(`OK  ${fname}  (${content.length} bytes)`, 'ok');
    } else {
      addLog(`--  ${fname}  not found`, 'fail');
    }
  }

  status.textContent = `Scan complete: ${count} slides found.`;
  if (count > 0) {
    addLog(`\n${count} slides found. Click "Download All Found" to save.`, 'warn');
  } else {
    addLog('\nNo cached slides found. Try opening this file via the same URL scheme (http:// or file://) as the original viewer.', 'warn');
  }
}

function downloadAll() {
  const keys = Object.keys(found).sort();
  if (keys.length === 0) {
    status.textContent = 'No slides to download. Run scan first.';
    return;
  }
  status.textContent = `Downloading ${keys.length} files...`;
  let i = 0;
  // Stagger downloads to avoid browser blocking
  const interval = setInterval(() => {
    if (i >= keys.length) {
      clearInterval(interval);
      status.textContent = `Done! Downloaded ${keys.length} files.`;
      return;
    }
    downloadFile(keys[i], found[keys[i]]);
    addLog(`Downloaded: ${keys[i]}`, 'ok');
    i++;
  }, 500);
}
</script>
</body>
</html>
