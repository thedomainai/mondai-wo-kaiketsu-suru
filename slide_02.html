<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>アジェンダ - 再現性のある問題解決フレームワーク</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Noto Sans JP', sans-serif;
        background-color: #ececec;
    }
    .slide-container {
        width: 1280px;
        height: 720px;
        position: relative;
        overflow: hidden;
        background-color: #ececec;
    }
</style>
</head>
<body>
<div class="slide-container">
    <!-- Background Dot Pattern -->
    <div data-object="true" data-object-type="shape" style="position: absolute; left: 0px; top: 0px; width: 1280px; height: 720px; background-image: radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 20px 20px; opacity: 0.4; z-index: 1;"></div>

    <!-- Circle Overlay Top-Right -->
    <div data-object="true" data-object-type="shape" style="position: absolute; left: 880px; top: -100px; width: 500px; height: 500px; border-radius: 50%; background-color: rgba(0,0,0,0.05); z-index: 1;"></div>

    <!-- Circle Overlay Bottom-Left -->
    <div data-object="true" data-object-type="shape" style="position: absolute; left: -100px; top: 420px; width: 400px; height: 400px; border-radius: 50%; background-color: rgba(0,0,0,0.03); z-index: 1;"></div>

    <!-- Branding Pill -->
    <div data-object="true" data-object-type="textbox" style="position: absolute; left: 40px; top: 32px; padding: 8px 24px; border: 2px solid #000000; border-radius: 9999px; background-color: transparent; z-index: 10;">
        <p style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; color: #000000; text-align: center; margin: 0;">PROBLEM SOLVING</p>
    </div>

    <!-- Title -->
    <div data-object="true" data-object-type="textbox" style="position: absolute; left: 0px; top: 100px; width: 1280px; text-align: center; z-index: 10;">
        <h1 style="font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 48px; color: #000000; margin: 0; letter-spacing: 1px;">アジェンダ</h1>
    </div>

    <!-- Subtitle -->
    <div data-object="true" data-object-type="textbox" style="position: absolute; left: 0px; top: 165px; width: 1280px; text-align: center; z-index: 10;">
        <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 20px; color: rgba(0,0,0,0.6); margin: 0;">120分</p>
    </div>

    <!-- Agenda Content Card -->
    <div data-object="true" data-object-type="shape" style="position: absolute; left: 240px; top: 230px; width: 800px; background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 40px; z-index: 10;">

        <!-- Left Column -->
        <div style="width: 360px; float: left;">
            <!-- Item 1 -->
            <div style="margin-bottom: 24px; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">01</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">ワーク</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">10分</p>
                </div>
            </div>

            <!-- Item 2 -->
            <div style="margin-bottom: 24px; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">02</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">前提・背景</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">10分</p>
                </div>
            </div>

            <!-- Item 3 -->
            <div style="margin-bottom: 24px; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">03</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">問題解決の概要</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">5分</p>
                </div>
            </div>

            <!-- Item 4 -->
            <div style="margin-bottom: 24px; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">04</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">論点を定義する</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">10分</p>
                </div>
            </div>

            <!-- Item 5 -->
            <div style="margin-bottom: 0; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">05</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">論点を分解する</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">20分</p>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div style="width: 360px; float: right;">
            <!-- Item 6 -->
            <div style="margin-bottom: 24px; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">06</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">仮説を構築する</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">15分</p>
                </div>
            </div>

            <!-- Item 7 -->
            <div style="margin-bottom: 24px; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">07</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">論点と仮説を検証する</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">15分</p>
                </div>
            </div>

            <!-- Item 8 -->
            <div style="margin-bottom: 24px; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">08</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">問題解決における<br/>コミュニケーション</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">15分</p>
                </div>
            </div>

            <!-- Item 9 -->
            <div style="margin-bottom: 0; display: flex; align-items: baseline;">
                <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 20px; color: #000000; width: 40px; flex-shrink: 0;">09</div>
                <div style="flex: 1;">
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #000000; margin: 0 0 2px 0;">Q&A</p>
                    <p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 13px; color: rgba(0,0,0,0.5); margin: 0;">20分</p>
                </div>
            </div>
        </div>

        <div style="clear: both;"></div>
    </div>

    <!-- Navigation Arrow -->
    <div data-object="true" data-object-type="shape" style="position: absolute; right: 40px; bottom: 40px; width: 48px; height: 48px; border-radius: 50%; background-color: #ffffff; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; z-index: 10;">
        <i class="fas fa-chevron-right" style="font-size: 18px; color: #000000;"></i>
    </div>
</div>
</body>
</html>
