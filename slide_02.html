<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>中林 佑太</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.intro-shell { position:absolute; left:80px; top:124px; width:1120px; display:grid; grid-template-columns:minmax(0, 620px) minmax(0, 420px); align-items:center; gap:72px; }
.intro-main { display:flex; flex-direction:column; }
.intro-eyebrow { color:rgba(0,0,0,0.34); font-family:"Space Grotesk",sans-serif; font-size:12px; font-weight:700; letter-spacing:2.4px; text-transform:uppercase; margin:0 0 18px; }
.intro-title { max-width:620px; font-size:72px; font-weight:900; line-height:1.05; letter-spacing:1px; margin:0 0 18px; }
.intro-lead { max-width:620px; font-size:24px; line-height:1.65; color:rgba(0,0,0,0.62); margin:0; }
.intro-panel { padding:8px 0 8px 28px; border-left:1px solid rgba(0,0,0,0.12); display:flex; flex-direction:column; gap:18px; }
.intro-panel__row { padding-bottom:18px; border-bottom:1px solid rgba(0,0,0,0.09); }
.intro-panel__row:last-child { padding-bottom:0; border-bottom:none; }
.intro-panel__label { margin:0 0 8px; color:rgba(0,0,0,0.34); font-family:"Space Grotesk",sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.intro-panel__value { margin:0; font-size:28px; font-weight:900; line-height:1.45; }
.intro-panel__value--compact { font-size:20px; line-height:1.7; color:rgba(0,0,0,0.76); }
</style>
</head>
<body>
<div class="slide-container slide-theme-mist" data-slide-kind="intro" data-background="halftone" data-footer="standard" data-footer-page="01">
<div class="intro-shell">
  <div class="intro-main">
    <p class="intro-eyebrow">PROFILE</p>
    <p class="intro-title">中林 佑太</p>
    <p class="intro-lead">2026/04/16 ロジカルシンキング研修</p>
  </div>
  <div class="intro-panel">
    <div class="intro-panel__row">
      <p class="intro-panel__label">Role</p>
      <p class="intro-panel__value">経営企画室長</p>
    </div>
    <div class="intro-panel__row">
      <p class="intro-panel__label">Focus</p>
      <p class="intro-panel__value intro-panel__value--compact">問題設定<br/>構造化<br/>意思決定</p>
    </div>
    <div class="intro-panel__row">
      <p class="intro-panel__label">Context</p>
      <p class="intro-panel__value intro-panel__value--compact">ロジカルシンキング研修の冒頭で、考え方の前提を揃える。</p>
    </div>
  </div>
</div>
</div>
</body>
</html>
