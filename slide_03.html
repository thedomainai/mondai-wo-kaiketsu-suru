<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>仕事で大事にしていること</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.intro-shell { position:absolute; left:80px; top:118px; width:1120px; display:grid; grid-template-columns:minmax(0, 620px) minmax(0, 420px); align-items:center; gap:72px; }
.intro-main { display:flex; flex-direction:column; }
.intro-eyebrow { color:rgba(0,0,0,0.34); font-family:"Space Grotesk",sans-serif; font-size:12px; font-weight:700; letter-spacing:2.4px; text-transform:uppercase; margin:0 0 18px; }
.intro-title { max-width:620px; font-size:68px; font-weight:900; line-height:1.08; letter-spacing:1px; margin:0 0 20px; }
.intro-lead { max-width:620px; font-size:23px; line-height:1.72; color:rgba(0,0,0,0.64); margin:0; }
.principles { display:flex; flex-direction:column; gap:18px; }
.principle { padding:0 0 18px 0; border-bottom:1px solid rgba(0,0,0,0.09); }
.principle:last-child { padding-bottom:0; border-bottom:none; }
.principle__title { margin:0 0 8px; font-size:24px; font-weight:900; line-height:1.45; }
.principle__text { margin:0; font-size:17px; line-height:1.75; color:rgba(0,0,0,0.68); }
</style>
</head>
<body>
<div class="slide-container slide-theme-mist" data-slide-kind="intro" data-background="halftone" data-footer="standard" data-footer-page="02">
<div class="intro-shell">
  <div class="intro-main">
    <p class="intro-eyebrow">VALUE</p>
    <p class="intro-title">仕事で大事にしていること</p>
    <p class="intro-lead">構造で考え、言葉を揃え、行動に落とすことを大事にしています。</p>
  </div>
  <div class="principles">
    <div class="principle">
      <p class="principle__title">解像度を上げる</p>
      <p class="principle__text">何を問うべきかを曖昧にせず、まず見る対象を揃える。</p>
    </div>
    <div class="principle">
      <p class="principle__title">構造で捉える</p>
      <p class="principle__text">要素を並べるのではなく、価値が生まれる条件として整理する。</p>
    </div>
    <div class="principle">
      <p class="principle__title">行動につなげる</p>
      <p class="principle__text">考えた結果が次の打ち手と意思決定に結びつくところまで持っていく。</p>
    </div>
  </div>
</div>
</div>
</body>
</html>
