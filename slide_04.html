<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>苦手なこと</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.intro-shell { position:absolute; left:80px; top:120px; width:1120px; display:grid; grid-template-columns:minmax(0, 610px) minmax(0, 430px); align-items:center; gap:80px; }
.intro-main { display:flex; flex-direction:column; }
.intro-eyebrow { color:rgba(0,0,0,0.34); font-family:"Space Grotesk",sans-serif; font-size:12px; font-weight:700; letter-spacing:2.4px; text-transform:uppercase; margin:0 0 18px; }
.intro-title { max-width:610px; font-size:70px; font-weight:900; line-height:1.06; letter-spacing:1px; margin:0 0 20px; }
.intro-lead { max-width:610px; font-size:22px; line-height:1.8; color:rgba(0,0,0,0.64); margin:0; }
.anti-list { display:flex; flex-direction:column; gap:18px; }
.anti-item { padding:0 0 18px 0; border-bottom:1px solid rgba(0,0,0,0.09); }
.anti-item:last-child { padding-bottom:0; border-bottom:none; }
.anti-item__title { margin:0 0 8px; font-size:23px; font-weight:900; line-height:1.45; }
.anti-item__text { margin:0; font-size:17px; line-height:1.75; color:rgba(0,0,0,0.68); }
</style>
</head>
<body>
<div class="slide-container slide-theme-mist" data-slide-kind="intro" data-background="halftone" data-footer="standard" data-footer-page="03">
<div class="intro-shell">
  <div class="intro-main">
    <p class="intro-eyebrow">ANTI-PATTERN</p>
    <p class="intro-title">苦手なこと</p>
    <p class="intro-lead">問題より先に作業に入ること、言葉が曖昧なまま議論が進むこと、行動が決まらない会議が苦手です。</p>
  </div>
  <div class="anti-list">
    <div class="anti-item">
      <p class="anti-item__title">作業が先に立つ</p>
      <p class="anti-item__text">何を解くべきかが曖昧なまま、手段だけが先に動き始める。</p>
    </div>
    <div class="anti-item">
      <p class="anti-item__title">定義が曖昧</p>
      <p class="anti-item__text">同じ言葉を使っていても、互いに見ているものが揃っていない。</p>
    </div>
    <div class="anti-item">
      <p class="anti-item__title">行動が決まらない</p>
      <p class="anti-item__text">話した量は多いのに、次に何をするかが最後まで決まらない。</p>
    </div>
  </div>
</div>
</div>
</body>
</html>
