<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>アジェンダ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
</head>
<body>
<div class="slide-container slide-theme-mist" data-slide-kind="agenda" data-background="grain" data-grain-opacity="0.5" data-vignette="true" data-footer="standard" data-footer-page="04">
  <div class="agenda-panel">
    <p class="agenda-panel__eyebrow">Agenda</p>
    <h1 class="agenda-panel__title agenda-panel__title--spaced">アジェンダ</h1>
  </div>
  <div class="agenda-panel__list-wrap">
    <div class="agenda-panel__list">
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">01</span>
        <span class="agenda-panel__item agenda-panel__item--timed">ワーク</span>
        <span class="agenda-panel__duration">10 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">02</span>
        <span class="agenda-panel__item agenda-panel__item--timed">前提・背景</span>
        <span class="agenda-panel__duration">10 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">03</span>
        <span class="agenda-panel__item agenda-panel__item--timed">問題解決の概要</span>
        <span class="agenda-panel__duration">5 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">04</span>
        <span class="agenda-panel__item agenda-panel__item--timed">論点を定義する</span>
        <span class="agenda-panel__duration">10 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">05</span>
        <span class="agenda-panel__item agenda-panel__item--timed">論点を分解する</span>
        <span class="agenda-panel__duration">20 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">06</span>
        <span class="agenda-panel__item agenda-panel__item--timed">仮説を構築する</span>
        <span class="agenda-panel__duration">15 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">07</span>
        <span class="agenda-panel__item agenda-panel__item--timed">論点と仮説を検証する</span>
        <span class="agenda-panel__duration">15 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed">
        <span class="agenda-panel__index agenda-panel__index--timed">08</span>
        <span class="agenda-panel__item agenda-panel__item--timed">問題解決におけるコミュニケーション</span>
        <span class="agenda-panel__duration">15 min</span>
      </div>
      <div class="agenda-panel__row agenda-panel__row--timed agenda-panel__row--last">
        <span class="agenda-panel__index agenda-panel__index--timed">09</span>
        <span class="agenda-panel__item agenda-panel__item--timed">まとめ</span>
        <span class="agenda-panel__duration">20 min</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
