<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>問題解決能力が高いとは何か</title>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet"/>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #ffffff;
    }
    .slide-container {
        width: 1280px;
        height: 720px;
        position: relative;
        overflow: hidden;
        background-color: #ffffff;
        font-family: 'Noto Sans JP', sans-serif;
    }
</style>
</head>
<body>
<div class="slide-container">
<!-- Background Dot Pattern (Shape) -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0px; top: 0px; width: 1280px; height: 720px; background-image: radial-gradient(circle, rgba(236,236,236,0.5) 1px, transparent 1px); background-size: 20px 20px; z-index: 1;"></div>
<!-- Gray Banner (Shape) -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 60px; top: 0px; width: 1220px; height: 200px; background-color: #ececec; clip-path: polygon(0 0, 100% 0, 100% 100%, 25% 100%); z-index: 1;"></div>
<!-- Company Pill (Textbox) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 32px; width: 240px; height: 40px; z-index: 10; display: flex; align-items: center;">
<p style="margin: 0; padding: 6px 24px; border: 2px solid #000000; border-radius: 9999px; font-size: 14px; font-weight: 700; color: #000000; letter-spacing: 1px; background-color: #ffffff; font-family: 'Space Grotesk', sans-serif;">PROBLEM SOLVING</p>
</div>
<!-- Section Title (Textbox) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 140px; width: 1120px; height: 80px; z-index: 10;">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 48px; color: #000000; line-height: 1.1; letter-spacing: 2px;">問題解決能力が高いとは何か</p>
</div>

<!-- 3-Step Transformation Flow -->
<!-- Step 1: NG (Wrong Understanding) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 270px; width: 300px; height: 140px; z-index: 10; background-color: #ffebee; border: 3px solid #c62828; border-radius: 12px; padding: 20px; box-sizing: border-box;">
<div style="display: flex; align-items: center; margin-bottom: 12px;">
<span style="display: inline-block; width: 36px; height: 36px; background-color: #c62828; color: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; margin-right: 12px; flex-shrink: 0;">×</span>
<p style="margin: 0; font-size: 14px; font-weight: 700; color: #666666; text-transform: uppercase; letter-spacing: 1px;">Wrong</p>
</div>
<p style="margin: 0; font-size: 19px; font-weight: 700; color: #000000; line-height: 1.4;">
どんな問題も<br/>必ず解決できる
</p>
</div>

<!-- Arrow 1 -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 400px; top: 330px; width: 80px; height: 4px; background-color: #000000; z-index: 10;"></div>
<div data-object="true" data-object-type="shape" style="position: absolute; left: 480px; top: 320px; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid #000000; z-index: 10;"></div>

<!-- Step 2: OK (Correct Understanding) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 520px; top: 270px; width: 320px; height: 140px; z-index: 10; background-color: #e8f5e9; border: 3px solid #2e7d32; border-radius: 12px; padding: 20px; box-sizing: border-box;">
<div style="display: flex; align-items: center; margin-bottom: 12px;">
<span style="display: inline-block; width: 36px; height: 36px; background-color: #2e7d32; color: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; margin-right: 12px; flex-shrink: 0;">○</span>
<p style="margin: 0; font-size: 14px; font-weight: 700; color: #666666; text-transform: uppercase; letter-spacing: 1px;">Correct</p>
</div>
<p style="margin: 0; font-size: 19px; font-weight: 700; color: #000000; line-height: 1.4;">
どんな問題も<br/>「解決できる可能性が高い」
</p>
</div>

<!-- Arrow 2 -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 860px; top: 330px; width: 80px; height: 4px; background-color: #000000; z-index: 10;"></div>
<div data-object="true" data-object-type="shape" style="position: absolute; left: 940px; top: 320px; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid #000000; z-index: 10;"></div>

<!-- Step 3: Core Insight -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 980px; top: 270px; width: 220px; height: 140px; z-index: 10; background-color: #000000; border-radius: 12px; padding: 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
<p style="margin: 0; font-size: 22px; font-weight: 900; color: #ffffff; line-height: 1.3; text-align: center;">
本質は<br/>「期待値を<br/>高めること」
</p>
</div>

<!-- Explanation Section -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 460px; width: 1120px; height: 180px; z-index: 10; background-color: #f5f5f5; border-radius: 12px; padding: 28px 32px; box-sizing: border-box;">
<div style="display: flex; align-items: center; margin-bottom: 20px;">
<i class="fas fa-lightbulb" style="font-size: 32px; color: #000000; margin-right: 16px;"></i>
<p style="margin: 0; font-size: 24px; font-weight: 900; color: #000000;">期待値を高めるとは</p>
</div>
<div style="display: flex; gap: 48px;">
<div style="flex: 1;">
<p style="margin: 0 0 8px 0; font-size: 18px; font-weight: 700; color: #000000; display: flex; align-items: center;">
<span style="display: inline-block; width: 10px; height: 10px; background-color: #000000; border-radius: 50%; margin-right: 12px;"></span>
一回勝負ではなく100回の平均で設計
</p>
</div>
<div style="flex: 1;">
<p style="margin: 0; font-size: 18px; font-weight: 700; color: #000000; display: flex; align-items: center;">
<span style="display: inline-block; width: 10px; height: 10px; background-color: #000000; border-radius: 50%; margin-right: 12px;"></span>
51回成功なら戦略として正しい
</p>
</div>
</div>
</div>

<!-- Navigation Arrow (Icon) -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 1192px; top: 640px; width: 48px; height: 48px; background-color: #000000; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 10;">
<i class="fas fa-chevron-right" style="color: #ffffff; font-size: 20px;"></i>
</div>
</div>
</body>
</html>
