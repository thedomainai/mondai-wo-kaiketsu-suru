<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="ワーク" data-header-title="見えている要素とつながりで差が出る" data-header-subtitle="構成要素を見るか、価値が生まれる条件を見るか" data-footer="standard" data-footer-page="10">
<div class="logic-wrap"><div class="logic-flow"><section class="logic-card"><p class="logic-num">01</p><p class="logic-head">要素しか見えていない</p><p class="logic-copy">バンズ、肉、チーズのように部品を並べても、何を改善すれば価値が上がるかは見えない。</p></section><section class="logic-card"><p class="logic-num">02</p><p class="logic-head">つながりまで見えている</p><p class="logic-copy">誰が、どの瞬間に、何をもって美味しいと感じるのかを置くと、評価基準と制約が見えてくる。</p></section><section class="logic-card"><p class="logic-num">03</p><p class="logic-head">だから打ち手が見える</p><p class="logic-copy">視覚を上げるのか、食感を変えるのか、提供体験を変えるのかという打ち手に接続できる。</p></section></div><div class="logic-conclusion"><p>差は「知識量」より、何を見て、どうつないでいるかに出る。</p></div></div>
