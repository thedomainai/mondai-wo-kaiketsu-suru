<title>見えている要素とつながりで差が出る</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: "Noto Sans JP", sans-serif;
    background: #ffffff;
  }

  .slide-container {
    width: 1280px;
    height: 720px;
    position: relative;
    overflow: hidden;
    background: #ffffff;
  }

  p {
    margin: 0;
  }

  .eyebrow {
    font-family: "Space Grotesk", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.6px;
    color: rgba(0, 0, 0, 0.34);
  }

  .content-stage {
    position: absolute;
    left: 80px;
    top: 166px;
    width: 1120px;
    height: 494px;
    display: grid;
    grid-template-rows: 28px 48px minmax(0, 1fr);
    row-gap: 10px;
    z-index: 10;
  }

  .stage-intro {
    display: flex;
    align-items: end;
    justify-content: space-between;
    min-height: 0;
  }

  .stage-intro__text {
    font-size: 15px;
    font-weight: 700;
    color: #5b476d;
  }

  .stage-intro__tag {
    font-family: "Space Grotesk", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.4px;
    color: #5b476d;
  }

  .stage-axis {
    min-height: 0;
    padding: 0 16px;
    border-top: 1px solid rgba(0, 0, 0, 0.14);
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    background: #f7f7f7;
    display: grid;
    grid-template-columns: 84px 1fr 170px;
    column-gap: 14px;
    align-items: center;
  }

  .stage-axis__label {
    font-size: 12px;
    font-weight: 700;
    color: rgba(0, 0, 0, 0.42);
  }

  .stage-axis__text {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.55;
    color: var(--soft-black);
  }

  .stage-axis__legend {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  .legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(0, 0, 0, 0.55);
  }

  .legend-chip__dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #c7c7c7;
  }

  .legend-chip__dot--active {
    background: var(--soft-black);
  }

  .stage-cards {
    min-height: 0;
  }

  .comparison-grid {
    height: 100%;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    column-gap: 20px;
    align-items: stretch;
  }

  .person-card {
    height: 100%;
    padding: 14px;
    border: 1px solid rgba(0, 0, 0, 0.12);
    border-radius: 8px;
    background: #ffffff;
    display: grid;
    grid-template-rows: 42px minmax(0, 1fr);
    row-gap: 12px;
    min-height: 0;
  }

  .person-card--focus {
    border: 2px solid var(--soft-black);
  }

  .person-card__header {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .person-card__token {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .person-card__token--outline {
    border: 2px solid rgba(0, 0, 0, 0.28);
    color: rgba(0, 0, 0, 0.76);
    background: #ffffff;
  }

  .person-card__token--soft {
    background: #6a6a6a;
    color: #ffffff;
  }

  .person-card__token--solid {
    background: var(--soft-black);
    color: #ffffff;
  }

  .person-card__token-text {
    font-family: "Space Grotesk", sans-serif;
    font-size: 20px;
    font-weight: 900;
  }

  .person-card__title-wrap {
    min-width: 0;
  }

  .person-card__title {
    margin-top: 0;
    font-size: 20px;
    font-weight: 900;
    line-height: 1.15;
    color: var(--soft-black);
    letter-spacing: 0;
  }

  .person-card__visual {
    min-height: 0;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 8px;
    background: #fcfcfc;
    overflow: hidden;
  }

  .svg-link {
    stroke: var(--soft-black);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .svg-link--ghost {
    stroke: #d3d3d3;
  }

  .svg-node--solid {
    fill: var(--soft-black);
  }

  .svg-node--ghost {
    fill: #d8d8d8;
  }

  .svg-node--outline {
    fill: #ffffff;
    stroke: var(--soft-black);
    stroke-width: 1.6;
  }

  .svg-node--outline-ghost {
    fill: #f5f5f5;
    stroke: #d6d6d6;
    stroke-width: 1.6;
  }

  svg {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
