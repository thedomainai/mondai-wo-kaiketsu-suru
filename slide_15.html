<script defer src="./slides.js"></script>
<style>

.expect-wrap{position:absolute;left:80px;top:186px;width:1120px;display:grid;grid-template-columns:300px 56px 320px 56px 1fr;column-gap:18px;row-gap:32px;align-items:center;}
.expect-box,.expect-core{min-height:170px;border-radius:8px;padding:24px 22px;display:flex;flex-direction:column;justify-content:center;}
.expect-box--bad{border:2px solid #c96a6a;background:#fff4f4;}
.expect-box--good{border:2px solid #6e9b70;background:#f4fbf4;}
.expect-label{margin:0 0 12px;color:rgba(0,0,0,0.34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;}

.expect-arrow::after{content:"";position:absolute;right:-2px;top:50%;transform:translateY(-50%);border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:14px solid rgba(0,0,0,0.72);}
.expect-core{background:#1a1a1a;color:#fff;text-align:center;}
.expect-core p{margin:0;font-size:34px;font-weight:900;line-height:1.35;}
.expect-note{grid-column:1 / -1;padding:18px 22px;border-radius:8px;background:rgba(0,0,0,0.04);}

<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第02章 前提・背景" data-header-title="高い問題解決能力 = 高い問題解決期待値" data-header-subtitle="本質は「必ず解けること」ではなく「高い期待値で解けること」" data-footer="standard" data-footer-page="14">
<div class="expect-wrap"><section class="expect-box expect-box--bad"><p class="expect-label">WRONG</p><p class="expect-head">どんな問題も必ず解ける</p></section><div class="expect-arrow"></div><section class="expect-box expect-box--good"><p class="expect-label">RIGHT</p><p class="expect-head">どんな問題も、解ける可能性が高い</p></section><div class="expect-arrow"></div><section class="expect-core"><p>本質は<br/>期待値を<br/>高めること</p></section><div class="expect-note"><p>1回の勝ち負けではなく、100回繰り返したときの平均で設計する。51回勝てるやり方なら、戦略としては正しい。</p></div></div>
