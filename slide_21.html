<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>問題解決とは論点に対して答えを出すこと</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;family=Space+Grotesk:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Noto Sans JP', sans-serif;
        background-color: #ffffff;
    }
    .slide-container {
        width: 1280px;
        height: 720px;
        position: relative;
        overflow: hidden;
        background: white;
    }
    p {
        margin: 0;
    }
</style>
</head>
<body>
<div class="slide-container">
<!-- Background Elements -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0; top: 0; width: 1280px; height: 720px; background-image: radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 20px 20px; opacity: 0.4; z-index: 1;"></div>
<div data-object="true" data-object-type="shape" style="position: absolute; left: 640px; top: 0; width: 640px; height: 720px; background-color: #ececec; clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%, 0 20px); z-index: 1;"></div>
<!-- Branding Pill -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 40px; top: 32px; width: 220px; height: 36px; padding: 8px 24px; border: 2px solid #000000; border-radius: 9999px; z-index: 10; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">
<p style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; color: #000000; text-align: center; margin: 0;">PROBLEM SOLVING</p>
</div>
<!-- Left Panel Content -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 140px; width: 500px; height: 500px; z-index: 10;">
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 42px; line-height: 1.1; color: #000000; margin-bottom: 32px; letter-spacing: 1px;">問題解決とは論点に対して答えを出すこと</p>
<p style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: rgba(0,0,0,0.5); letter-spacing: 2px; margin-bottom: 8px;">PREMISE</p>
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 20px; color: #000000; margin-bottom: 16px; border-bottom: 2px solid #000000; display: inline-block; padding-bottom: 4px;">前提</p>
<div style="margin-bottom: 28px; padding-left: 16px; border-left: 4px solid rgba(0,0,0,0.2);">
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 18px; line-height: 1.6; color: #000000; margin-bottom: 6px;">正しい行動が決まれば、</p>
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 18px; line-height: 1.6; color: #000000;">あとは実行するのみ。</p>
</div>
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 20px; color: #000000; margin-bottom: 12px; border-bottom: 2px solid #000000; display: inline-block; padding-bottom: 4px;">つまり...</p>
<div style="margin-bottom: 0; padding-left: 16px; border-left: 4px solid rgba(0,0,0,0.2);">
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 17px; line-height: 1.5; color: #000000; margin-bottom: 10px; display: flex; align-items: flex-start;">
<span style="margin-right: 12px;">▶</span> <span>論点とは行動を起こすための問いである</span>
</p>
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 17px; line-height: 1.5; color: #000000; display: flex; align-items: flex-start;">
<span style="margin-right: 12px;">▶</span> <span>答えを出す ＝ 行動を決める</span>
</p>
</div>
</div>
<!-- Right Panel Content -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 700px; top: 180px; width: 500px; height: 420px; z-index: 10;">
<p style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: rgba(0,0,0,0.5); letter-spacing: 2px; margin-bottom: 12px;">CONCLUSION</p>
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 27px; line-height: 1.2; color: #000000; margin-bottom: 32px; border-bottom: 2px solid #000000; padding-bottom: 10px; display: inline-block;">結論</p>
<div style="background-color: #ffffff; border: 3px solid #000000; padding: 40px 24px; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); text-align: center;">
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 27px; line-height: 1.5; color: #000000; margin-bottom: 16px;">
問題解決とは<br/>行動を見つけること<br/>である</p>
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 12px; line-height: 1.5; color: #555555; margin: 0; text-align: left;">※ここでの「行動」には、何を解くべきかを定めること、制約を調整すること、見方を更新することも含まれる。</p>
</div>
</div>
<!-- Navigation Arrow -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 1200px; top: 640px; width: 48px; height: 48px; background-color: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); z-index: 10;">
<i class="fas fa-chevron-right" style="color: #000000; font-size: 20px;"></i>
</div>
</div>
</body>
</html>
