<!DOCTYPE html>

<html lang="ja">
<head>

<title>仮説思考の罠：知見がないときどうするか</title>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>

        overflow: hidden;

<div class="slide-container">

<!-- Gray Banner (Shape) -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 60px; top: 0px; width: 1220px; height: 280px; background-color: #ececec; clip-path: polygon(0 0, 100% 0, 100% 100%, 25% 100%); z-index: 1;"></div>
<!-- Company Pill (Textbox) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 32px; width: 240px; height: 40px; z-index: 10; display: flex; align-items: center;">
<p style="margin: 0; padding: 6px 24px; border: 2px solid #000000; border-radius: 9999px; font-size: 14px; font-weight: 700; color: #000000; letter-spacing: 1px; background-color: #ffffff;">PROBLEM SOLVING</p>
</div>

<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 38px; color: #000000; line-height: 1.1; letter-spacing: 2px;">仮説思考の罠</p>
<p style="margin: 8px 0 0 0; font-size: 20px; font-weight: 700; color: #333333;">知見がないときどうするか</p>
</div>
<!-- Body Content (Textbox) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 320px; width: 1000px; height: 350px; z-index: 10;">
<div style="background-color: #ececec; padding: 12px 24px; border-left: 8px solid #000000; margin-bottom: 24px; border-radius: 8px;">
<p style="margin: 0; font-size: 18px; font-weight: 900; color: #000000;">
知見がない ＝ 仮説が浅くなるリスク
</p>
</div>
<p style="margin: 0 0 14px 0; font-size: 18px; font-weight: 600; color: #666666; line-height: 1.5;">
<span style="color: #000000; font-size: 17px; font-weight: 900; margin-right: 8px;">×</span> 浅い仮説を無理やり出す
</p>
<p style="margin: 0 0 12px 0; font-size: 18px; font-weight: 700; color: #000000; line-height: 1.5;">
<span style="color: #000000; font-size: 17px; font-weight: 900; margin-right: 8px;">○</span> 論点のレベルを上げる
</p>
<div style="padding-left: 40px; margin-top: 12px;">
<p style="margin: 0 0 12px 0; font-size: 18px; font-weight: 700; color: #333333;">
「筋のいい仮説を構築するには何をするべきか？」
</p>
<p style="margin: 0 0 8px 20px; font-size: 18px; font-weight: 600; color: #555555; display: flex; align-items: center;">

<p style="margin: 0 0 0 20px; font-size: 18px; font-weight: 600; color: #555555; display: flex; align-items: center;">
<span style="display: inline-block; width: 6px; height: 6px; background-color: #000000; border-radius: 50%; margin-right: 12px;"></span>

</p>
