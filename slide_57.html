<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>検証結果から次の行動を決める</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Noto Sans JP', sans-serif;
        background-color: #ffffff;
    }
    .slide-container {
        width: 1280px;
        height: 720px;
        position: relative;
        overflow: hidden;
        background-color: #ffffff;
    }
</style>
</head>
<body>
<div class="slide-container">
<!-- === STANDARDIZED HEADER === -->
<div style="position: absolute; left: 0; top: 0; width: 1280px; height: 148px; background-color: #ffffff; z-index: 50;"></div>
<div style="position: absolute; left: 40px; top: 16px; z-index: 55;">
<p style="margin: 0; padding: 5px 18px; border: 2px solid #000; border-radius: 9999px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px; color: #000; letter-spacing: 1px; background: #ffffff; display: inline-block;">PROBLEM SOLVING</p>
</div>
<div style="position: absolute; right: 40px; top: 22px; z-index: 55;">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 12px; color: #999; letter-spacing: 0.5px;">第7章 解を伝える</p>
</div>
<div style="position: absolute; left: 80px; top: 52px; width: 1120px; z-index: 55;">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 32px; color: #000; letter-spacing: 1px; line-height: 1.2;">意思決定構造を押さえる</p>
</div>
<div style="position: absolute; left: 80px; top: 100px; width: 1120px; z-index: 55;">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 14px; color: #888; line-height: 1.4;">組織相手の場合、構造を押さえないと外れる</p>
</div>
<!-- === END HEADER === -->

<!-- Background Dot Pattern (Shape) -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0px; top: 0px; width: 1280px; height: 720px; background-image: radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 20px 20px; opacity: 0.4; z-index: 1;"></div>
<!-- Gray Accent Banner Top-Right (Shape) -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 880px; top: 0px; width: 400px; height: 180px; background-color: #ececec; clip-path: polygon(0 0, 100% 0, 100% 100%, 30% 100%); z-index: 1;"></div>
<!-- Section Title and Subtitle (Textbox) -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 80px; top: 120px; width: 780px; height: 100px; z-index: 10;">
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 40px; color: #000000; line-height: 1.1; margin: 0 0 12px 0; letter-spacing: 1px;">検証結果から次の行動を決める</p>
<p style="font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 16px; color: #333333; line-height: 1.5; margin: 0;">検証後の3つのパターンと対処法</p>
</div>

<!-- Branching Flow Diagram -->
<!-- Input Node: 検証結果 -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 240px; width: 200px; height: 80px; background-color: #000000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 24px; color: #ffffff; text-align: center;">検証結果</p>
</div>

<!-- Vertical line down from input -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 320px; width: 4px; height: 50px; background-color: #000000; z-index: 9;"></div>

<!-- Branching point (circle) -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 370px; width: 20px; height: 20px; background-color: #000000; border-radius: 50%; z-index: 10;"></div>

<!-- Horizontal lines to 3 branches -->
<!-- Left branch line -->
<div style="position: absolute; left: 180px; top: 379px; width: 360px; height: 4px; background-color: #000000; z-index: 9;"></div>
<!-- Center branch line -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 390px; width: 4px; height: 40px; background-color: #000000; z-index: 9;"></div>
<!-- Right branch line -->
<div style="position: absolute; right: 180px; top: 379px; width: 360px; height: 4px; background-color: #000000; z-index: 9;"></div>

<!-- Branch 1: 仮説が正しかった (Left) -->
<div style="position: absolute; left: 64px; top: 430px; width: 340px; height: 220px; z-index: 10;">
<!-- Vertical line down -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 0; width: 4px; height: 40px; background-color: #000000;"></div>
<!-- Arrow head -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 35px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #000000;"></div>
<!-- Outcome box -->
<div style="position: absolute; top: 50px; width: 100%; height: 70px; background-color: #e8f5e9; border: 3px solid #2e7d32; border-radius: 12px; padding: 12px 16px; box-sizing: border-box;">
<p style="margin: 0 0 4px 0; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #000000;">1</p>
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 17px; color: #000000; line-height: 1.3;">仮説が正しかった</p>
</div>
<!-- Vertical line down -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 120px; width: 4px; height: 30px; background-color: #2e7d32;"></div>
<!-- Arrow head -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 145px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #2e7d32;"></div>
<!-- Action box -->
<div style="position: absolute; top: 160px; width: 100%; height: 60px; background-color: #ffffff; border: 3px solid #2e7d32; border-radius: 12px; padding: 12px 16px; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 20px; color: #000000; text-align: center;">行動に移す</p>
</div>
</div>

<!-- Branch 2: 仮説が間違っていた (Center) -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 430px; width: 340px; height: 220px; z-index: 10;">
<!-- Vertical line down -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 0; width: 4px; height: 40px; background-color: #000000;"></div>
<!-- Arrow head -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 35px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #000000;"></div>
<!-- Outcome box -->
<div style="position: absolute; top: 50px; width: 100%; height: 70px; background-color: #fff3e0; border: 3px solid #e65100; border-radius: 12px; padding: 12px 16px; box-sizing: border-box;">
<p style="margin: 0 0 4px 0; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #000000;">2</p>
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 17px; color: #000000; line-height: 1.3;">仮説が間違っていた</p>
</div>
<!-- Vertical line down -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 120px; width: 4px; height: 30px; background-color: #e65100;"></div>
<!-- Arrow head -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 145px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #e65100;"></div>
<!-- Action box -->
<div style="position: absolute; top: 160px; width: 100%; height: 60px; background-color: #ffffff; border: 3px solid #e65100; border-radius: 12px; padding: 8px 12px; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 17px; color: #000000; text-align: center; line-height: 1.3;">仮説を修正し、<br/>再度検証する</p>
</div>
</div>

<!-- Branch 3: 判断に足る情報が得られなかった (Right) -->
<div style="position: absolute; right: 64px; top: 430px; width: 340px; height: 220px; z-index: 10;">
<!-- Vertical line down -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 0; width: 4px; height: 40px; background-color: #000000;"></div>
<!-- Arrow head -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 35px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #000000;"></div>
<!-- Outcome box -->
<div style="position: absolute; top: 50px; width: 100%; height: 70px; background-color: #f3e5f5; border: 3px solid #6a1b9a; border-radius: 12px; padding: 12px 16px; box-sizing: border-box;">
<p style="margin: 0 0 4px 0; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #000000;">3</p>
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 15px; color: #000000; line-height: 1.3;">判断に足る情報が<br/>得られなかった</p>
</div>
<!-- Vertical line down -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 120px; width: 4px; height: 30px; background-color: #6a1b9a;"></div>
<!-- Arrow head -->
<div style="position: absolute; left: 50%; transform: translateX(-50%); top: 145px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #6a1b9a;"></div>
<!-- Action box -->
<div style="position: absolute; top: 160px; width: 100%; height: 60px; background-color: #ffffff; border: 3px solid #6a1b9a; border-radius: 12px; padding: 6px 12px; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
<p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 15px; color: #000000; text-align: center; line-height: 1.3;">追加の検証を設計するか、<br/>リスクを受容して仮決定する</p>
</div>
</div>
<!-- === STANDARDIZED FOOTER === -->
<div style="position: absolute; left: 0; top: 660px; width: 1280px; height: 60px; background-color: #ffffff; border-top: 1px solid rgba(0,0,0,0.08); z-index: 50;"></div>
<div style="position: absolute; left: 40px; top: 680px; z-index: 55;">
<p style="margin: 0; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 11px; color: #bbb; letter-spacing: 1.5px;">LOGICAL THINKING TRAINING</p>
</div>
<div style="position: absolute; right: 40px; top: 680px; z-index: 55;">
<p style="margin: 0; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 11px; color: #bbb; letter-spacing: 0.5px;">38 / 47</p>
</div>
<!-- === END FOOTER === -->
</div>
</body>
</html>
