<div class="slide-container slide-theme-paper" data-slide-kind="summary" data-footer="standard" data-footer-brand="LOGICAL THINKING TRAINING" data-footer-page="70"><div class="summary-wrap"><p class="summary-eyebrow">SUMMARY</p><p class="summary-title">まとめ</p><div class="summary-grid"><section class="summary-card"><p class="summary-num">01</p><p class="summary-head">問題解決とは行動を見つけること</p><p class="summary-copy">正しい行動が決まれば、あとは実行するのみである。</p></section><section class="summary-card"><p class="summary-num">02</p><p class="summary-head">論点定義が最も重要である</p><p class="summary-copy">問いが外れていれば、その先でどれだけ頑張っても外れる。</p></section><section class="summary-card"><p class="summary-num">03</p><p class="summary-head">論点には必ず「べき」を含める</p><p class="summary-copy">行動に接続しない問いは、問題解決の論点ではない。</p></section><section class="summary-card"><p class="summary-num">04</p><p class="summary-head">仮説はベストエフォートで必ず出す</p><p class="summary-copy">正しさより先に、検証できる仮の答えを置く。</p></section><section class="summary-card summary-card--wide"><p class="summary-num">05</p><p class="summary-head">結果と行動を切り離す</p><p class="summary-copy">正しく間違えれば、戻ってやり直せば期待値は上がる。</p></section></div></div></div></body>
