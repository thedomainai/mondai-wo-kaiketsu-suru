<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>問題を解決する</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
<link href="./slides.css" rel="stylesheet">
<script defer src="./slides.js"></script>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: "Noto Sans JP", sans-serif;
  }

  .cover-shell {
    position: absolute;
    inset: 0;
    padding: 72px 80px 68px;
    display: grid;
    grid-template-rows: 1fr auto;
  }

  .cover-hero {
    align-self: center;
    max-width: 920px;
  }

  .cover-eyebrow {
    margin: 0 0 var(--space-stack-lead-title-loose);
    color: rgba(0, 0, 0, 0.42);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0;
  }

  .cover-title {
    margin: 0 0 var(--space-stack-title-body-loose);
    color: #000000;
    font-size: 82px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: 0;
  }

  .cover-subtitle {
    margin: 0;
    max-width: 760px;
    color: rgba(0, 0, 0, 0.64);
    font-size: 24px;
    font-weight: 700;
    line-height: 1.45;
    letter-spacing: 0;
  }

  .cover-meta {
    width: min(860px, 100%);
    padding-top: 24px;
    border-top: 1px solid var(--ink-12);
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 24px 64px;
  }

  .cover-meta__item {
    display: grid;
    gap: 10px;
    align-content: start;
  }

  .cover-meta__label {
    margin: 0;
    color: rgba(0, 0, 0, 0.42);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0;
  }

  .cover-meta__value {
    margin: 0;
    color: var(--soft-black);
    font-size: 22px;
    font-weight: 900;
    line-height: 1.45;
    letter-spacing: 0;
  }

  .cover-meta__subvalue {
    margin: 4px 0 0;
    color: rgba(0, 0, 0, 0.56);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.5;
    letter-spacing: 0;
  }
</style>
</head>
<body style="user-select: none;">
<div class="slide-container slide-theme-mist" data-slide-kind="cover" data-background="grain" data-grain-opacity="0.18" data-vignette="false">
  <main class="cover-shell">
    <section class="cover-hero" aria-label="表紙タイトル">
      <p class="cover-eyebrow">ロジカル・シンキング研修</p>
      <h1 class="cover-title">問題を解決する</h1>
      <p class="cover-subtitle">問題解決フレームワークの原理原則と実践</p>
    </section>

    <section class="cover-meta" aria-label="研修情報">
      <div class="cover-meta__item">
        <p class="cover-meta__label">実施日</p>
        <p class="cover-meta__value">2026年4月16日（木）</p>
      </div>

      <div class="cover-meta__item">
        <p class="cover-meta__label">担当</p>
        <div>
          <p class="cover-meta__value">中林 佑太</p>
        </div>
      </div>
    </section>
  </main>
</div>
</body>
</html>
