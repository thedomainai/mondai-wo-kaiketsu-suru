<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>苦手なこと</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
</head>
<body>
<div class="slide-container slide-theme-mist" data-slide-kind="intro" data-background="grain" data-grain-opacity="0.18" data-vignette="false" data-footer="standard" data-footer-page="04">
  <div style="position:absolute; left:80px; top:0; width:1110px; height:720px; z-index:10; display:grid; grid-template-columns:370px 700px; column-gap:40px; align-items:start; align-content:center;">
    <div class="stack stack--left" style="--stack-gap:var(--space-stack-lead-title-loose);">
      <p style="margin:0; color:var(--ink-34); font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:700; letter-spacing:2.4px; text-transform:uppercase;">DISLIKE</p>
      <div class="stack stack--left" style="--stack-gap:var(--space-stack-title-body-loose);">
        <p style="font-weight:900; font-size:64px; line-height:1.08; color:var(--soft-black); margin:0;">苦手なこと</p>
        <p style="font-size:16px; font-weight:400; line-height:1.75; color:rgba(0,0,0,.58); margin:0;"></p>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:24px;">
      <div style="min-height:125px; padding:24px 28px; box-sizing:border-box; background:transparent; border:1px solid var(--ink-08); border-radius:8px; display:flex; align-items:flex-start; gap:22px;">
        <div style="width:52px; height:52px; flex:0 0 52px; align-self:center; border:1px solid var(--ink-08); border-radius:8px; display:flex; align-items:center; justify-content:center; background:transparent;">
          <p style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; line-height:1; color:var(--soft-black); margin:0;">01</p>
        </div>
        <div class="stack stack--left" style="flex:1; --stack-gap:var(--space-stack-title-body);">
          <p style="font-weight:900; font-size:24px; line-height:1.4; color:var(--soft-black); margin:0;">私生活全般</p>
          <p style="font-size:16px; line-height:1.7; color:rgba(0,0,0,.58); margin:0;">家事全般・運転・公共料金の支払いとか。</p>
        </div>
      </div>

      <div style="min-height:125px; padding:24px 28px; box-sizing:border-box; background:transparent; border:1px solid var(--ink-08); border-radius:8px; display:flex; align-items:flex-start; gap:22px;">
        <div style="width:52px; height:52px; flex:0 0 52px; align-self:center; border:1px solid var(--ink-08); border-radius:8px; display:flex; align-items:center; justify-content:center; background:transparent;">
          <p style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; line-height:1; color:var(--soft-black); margin:0;">02</p>
        </div>
        <div class="stack stack--left" style="flex:1; --stack-gap:var(--space-stack-title-body);">
          <p style="font-weight:900; font-size:24px; line-height:1.4; color:var(--soft-black); margin:0;">歌</p>
          <p style="font-size:16px; line-height:1.7; color:rgba(0,0,0,.58); margin:0;">信じられないほど音痴。</p>
        </div>
      </div>

      <div style="min-height:125px; padding:24px 28px; box-sizing:border-box; background:transparent; border:1px solid var(--ink-08); border-radius:8px; display:flex; align-items:flex-start; gap:22px;">
        <div style="width:52px; height:52px; flex:0 0 52px; align-self:center; border:1px solid var(--ink-08); border-radius:8px; display:flex; align-items:center; justify-content:center; background:transparent;">
          <p style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; line-height:1; color:var(--soft-black); margin:0;">03</p>
        </div>
        <div class="stack stack--left" style="flex:1; --stack-gap:var(--space-stack-title-body);">
          <p style="font-weight:900; font-size:24px; line-height:1.4; color:var(--soft-black); margin:0;">お酒</p>
          <p style="font-size:16px; line-height:1.7; color:rgba(0,0,0,.58); margin:0;">これに関してはまじで来世は酒豪になりたいです。</p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
