<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>問題解決力とは</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.p17-center .inner{
  display:grid;
  gap:18px;
}

.p17-center .title{
  margin:0 auto;
  max-width:760px;
  color:rgba(0,0,0,.58);
  font-size:28px;
  font-weight:700;
  line-height:1.45;
  letter-spacing:0;
}

.p17-center .subtitle{
  max-width:980px;
  color:#111;
  font-size:46px;
  font-weight:900;
  line-height:1.3;
}

.p17-flow{
  margin:6px auto 0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:nowrap;
  width:max-content;
  max-width:980px;
}

.p17-flow__label{
  color:rgba(0,0,0,.54);
  font-size:13px;
  font-weight:700;
  line-height:1.4;
  letter-spacing:0;
  white-space:nowrap;
}

.p17-flow__arrow{
  position:relative;
  width:18px;
  height:10px;
  flex:0 0 auto;
}

.p17-flow__arrow::before{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:11px;
  height:1.5px;
  background:rgba(0,0,0,.34);
  transform:translateY(-50%);
}

.p17-flow__arrow::after{
  content:"";
  position:absolute;
  right:0;
  top:50%;
  width:0;
  height:0;
  border-top:5px solid transparent;
  border-bottom:5px solid transparent;
  border-left:7px solid rgba(0,0,0,.34);
  transform:translateY(-50%);
}
</style>
</head>
<body>
<div class="slide-container slide-theme-paper slide-center-title p17-center" data-slide-kind="center-title" data-footer="standard" data-footer-page="17">
  <div class="content">
    <div class="inner" style="max-width:980px;">
      <p class="chapter">QUESTION</p>
      <p class="title">問題解決力とは</p>
      <p class="subtitle">ゴールを解像度高く定義or理解し、<br>適確な解を導き出す能力</p>
      <div class="p17-flow" aria-label="問題解決の流れ">
        <span class="p17-flow__label">ゴールの定義/理解</span>
        <span class="p17-flow__arrow" aria-hidden="true"></span>
        <span class="p17-flow__label">論点の定義</span>
        <span class="p17-flow__arrow" aria-hidden="true"></span>
        <span class="p17-flow__label">論点の分解</span>
        <span class="p17-flow__arrow" aria-hidden="true"></span>
        <span class="p17-flow__label">仮説構築</span>
        <span class="p17-flow__arrow" aria-hidden="true"></span>
        <span class="p17-flow__label">仮説検証</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
