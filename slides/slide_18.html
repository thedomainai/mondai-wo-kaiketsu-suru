<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>問題解決力は期待値で測る</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>

.expect-wrap{position:absolute;left:80px;top:186px;width:1120px;display:grid;grid-template-rows:auto auto auto;row-gap:24px;}
.expect-compare{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px;align-items:stretch;}
.expect-card,.expect-core,.expect-note{border-radius:8px;padding:24px 22px;}
.expect-card{min-height:152px;display:flex;flex-direction:column;justify-content:center;}
.expect-card--bad{border:2px solid #c96a6a;background:#fff4f4;}
.expect-card--good{border:2px solid #6e9b70;background:#f4fbf4;}
.expect-label{margin:0 0 18px;font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--ink-34);}
.expect-head{margin:0;font-size:30px;font-weight:900;line-height:1.4;}
.expect-core{background:var(--ink-100);color:var(--surface-white);border:2px solid var(--ink-100);text-align:center;}
.expect-core .expect-label{margin-bottom:14px;color:rgba(255,255,255,0.56);}
.expect-core .expect-head{font-size:38px;line-height:1.3;}
.expect-note{background:var(--ink-04);text-align:center;}
.expect-copy{margin:0;font-size:18px;font-weight:900;line-height:1.8;color:rgba(0,0,0,0.72);}

</style>
</head>
<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第02章 前提・背景" data-header-title="問題解決力は期待値で測る" data-header-subtitle="問題解決力とは" data-footer="standard" data-footer-page="18">
<div class="expect-wrap">
  <div class="expect-compare">
    <section class="expect-card expect-card--bad">
      <p class="expect-label">Wrong</p>
      <p class="expect-head">どんな問題も必ず解ける</p>
    </section>
    <section class="expect-card expect-card--good">
      <p class="expect-label">Right</p>
      <p class="expect-head">どんな問題も、解ける可能性が高い</p>
    </section>
  </div>
  <section class="expect-core">
    <p class="expect-label">本質</p>
    <p class="expect-head">期待値を高めること</p>
  </section>
  <section class="expect-note">
    <p class="expect-copy">1回の勝ち負けではなく、100回繰り返したときの平均で設計する。51回勝てるやり方なら、戦略として正しい。</p>
  </section>
</div>
</div>
</body>
</html>
