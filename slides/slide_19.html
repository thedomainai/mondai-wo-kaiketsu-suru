<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>結果と行動を分けて期待値を測る</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.separate-wrap{position:absolute;left:80px;top:188px;width:1120px;display:grid;grid-template-columns:400px 1fr;gap:34px}
.separate-lead{display:flex;flex-direction:column;gap:16px}
.separate-lead__copy{margin:0;font-size:19px;font-weight:900;line-height:1.8}
.separate-point{padding:16px 18px;border-radius:8px;background:var(--ink-04)}
.separate-point__label{margin:0 0 8px;color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.separate-point__body{margin:0;font-size:15px;line-height:1.8;color:var(--ink-68)}
.result-map{padding:26px 28px;border:1px solid var(--ink-10);border-radius:8px;background:var(--surface-white);display:grid;grid-template-rows:auto auto 1fr auto;row-gap:22px}
.result-map__head{margin:0;font-size:24px;font-weight:900;line-height:1.5}
.result-map__cluster{position:relative;min-height:250px}
.result-node{position:absolute;padding:10px 14px;border-radius:999px;background:rgba(0,0,0,.05);font-size:13px;font-weight:700;line-height:1.4}
.result-node--core{left:50%;top:50%;transform:translate(-50%,-50%);width:176px;height:176px;border-radius:50%;background:var(--ink-100);color:var(--surface-white);display:flex;align-items:center;justify-content:center;text-align:center;font-size:30px;font-weight:900;line-height:1.3}
.result-node--one{left:24px;top:26px}
.result-node--two{right:30px;top:18px}
.result-node--three{left:0;top:118px}
.result-node--four{right:8px;top:126px}
.result-node--five{left:74px;bottom:10px}
.result-node--six{right:84px;bottom:4px}
.result-map__foot{padding-top:18px;border-top:1px solid var(--ink-08)}
.result-map__foot p{margin:0;font-size:16px;font-weight:900;line-height:1.75}
</style>
</head>
<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第02章 前提・背景" data-header-title="結果と行動を分けて期待値を測る" data-header-subtitle="期待値評価" data-footer="standard" data-footer-page="19">
<div class="separate-wrap">
<div class="separate-lead">
<p class="separate-lead__copy">現実は膨大な要素で決まる。<br/>だから、悪い結果が出た瞬間に<br/>悪い行動だったと決めつけてはいけない。</p>
<section class="separate-point">
<p class="separate-point__label">Wrong</p>
<p class="separate-point__body">結果が悪い → 意思決定/行動が悪い<br>これでは、たまたま外れた良い打ち手まで捨ててしまう可能性を持つ</p>
</section>
<section class="separate-point">
<p class="separate-point__label">Right</p>
<p class="separate-point__body">評価すべきは、意思決定の品質、実行の品質<br>結果評価と行動評価を切り離す</p>
</section>
</div>
<section class="result-map">
<p class="result-map__head">結果は、思考/行動だけでなく外部要因にも左右される</p>
<div class="result-map__cluster">
<div class="result-node result-node--core">結果</div>
<div class="result-node result-node--one">市場環境</div>
<div class="result-node result-node--two">競合の動き</div>
<div class="result-node result-node--three">タイミング</div>
<div class="result-node result-node--four">他者の判断</div>
<div class="result-node result-node--five">偶然・運</div>
<div class="result-node result-node--six">自分の思考と行動</div>
</div>
<div class="result-map__foot"><p>コントロールできるのは一部だけである。だからこそ、外れた結果ではなく、そこに至るプロセスを学習対象にする。</p></div>
</section>
</div>
</div>
</body>
</html>
