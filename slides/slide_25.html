<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>7ステップのフレームワーク</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.phase-wrap{position:absolute;left:80px;top:210px;width:1120px;display:flex;gap:10px}
.phase-card{position:relative;width:152px;min-height:232px;padding:20px 18px 22px 24px;color:var(--ink-100);background:rgba(0,0,0,.045);display:grid;grid-template-rows:auto 1fr;align-content:start;row-gap:var(--space-stack-lead-title-loose);clip-path:polygon(0 0,94% 0,100% 50%,94% 100%,0 100%,6% 50%)}
.phase-card:first-child{clip-path:polygon(0 0,94% 0,100% 50%,94% 100%,0 100%)}
.phase-card:last-child{clip-path:polygon(0 0,94% 0,100% 50%,94% 100%,0 100%,6% 50%)}
.phase-card__num{width:50px;height:50px;margin:0 auto;border:2px solid var(--ink-18);border-radius:50%;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,.72);font-family:"Space Grotesk",sans-serif;font-size:21px;font-weight:900;line-height:1;letter-spacing:0;text-align:center}
.phase-card__copy{display:grid;row-gap:var(--space-stack-title-body)}
.phase-card__head{margin:0;font-size:20px;font-weight:900;line-height:1.45}
.phase-card__body{margin:0;font-size:12px;line-height:1.75;color:rgba(0,0,0,.66)}
.phase-summary{position:absolute;left:80px;top:526px;width:1120px;display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
.phase-summary__main{padding:18px 20px;border-radius:8px;background:var(--ink-100);color:var(--surface-white)}
.phase-summary__main p{margin:0;font-size:24px;font-weight:900;line-height:1.5}
.phase-summary__note{padding:18px 20px;border-radius:8px;background:var(--ink-04)}
.phase-summary__note p{margin:0;font-size:15px;line-height:1.85;color:rgba(0,0,0,.72)}
</style>
</head>
<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第03章 問題解決の概要" data-header-title="7ステップのフレームワーク" data-header-subtitle="問題解決には定石と呼べる流れがあり、現実にはそのステップを何度も行き来する" data-footer="standard" data-footer-page="25">
  <div class="phase-wrap">
    <section class="phase-card"><p class="phase-card__num">01</p><div class="phase-card__copy"><p class="phase-card__head">目的・制約の合意</p><p class="phase-card__body">何のために、どの条件で解くのかを揃える。</p></div></section>
    <section class="phase-card"><p class="phase-card__num">02</p><div class="phase-card__copy"><p class="phase-card__head">論点定義</p><p class="phase-card__body">何を決めるべきかという問いを置く。</p></div></section>
    <section class="phase-card"><p class="phase-card__num">03</p><div class="phase-card__copy"><p class="phase-card__head">論点分解</p><p class="phase-card__body">問いの全体像を見える単位までほどく。</p></div></section>
    <section class="phase-card"><p class="phase-card__num">04</p><div class="phase-card__copy"><p class="phase-card__head">仮説構築</p><p class="phase-card__body">各論点に対して、仮の答えを置く。</p></div></section>
    <section class="phase-card"><p class="phase-card__num">05</p><div class="phase-card__copy"><p class="phase-card__head">仮説検証</p><p class="phase-card__body">事実と論理で、仮説の良し悪しを確かめる。</p></div></section>
    <section class="phase-card"><p class="phase-card__num">06</p><div class="phase-card__copy"><p class="phase-card__head">解の伝達</p><p class="phase-card__body">結論、行動、残論点を伝わる形にする。</p></div></section>
    <section class="phase-card"><p class="phase-card__num">07</p><div class="phase-card__copy"><p class="phase-card__head">評価・学習</p><p class="phase-card__body">結果から学び、次の問いと行動へ戻す。</p></div></section>
  </div>
</div>
</body>
</html>
