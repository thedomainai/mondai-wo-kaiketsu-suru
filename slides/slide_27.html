<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>アインシュタインの言葉</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.quote-layout{position:absolute;left:80px;top:184px;width:1120px;display:grid;grid-template-columns:340px minmax(0,1fr);column-gap:44px;row-gap:28px;align-items:center;}
.quote-photo-frame{position:relative;height:344px;padding:18px;border:1px solid var(--ink-08);border-radius:8px;background:linear-gradient(180deg,#f8f8f8 0%,#f2f2f2 100%);overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px var(--ink-08);}
.quote-photo{width:100%;height:100%;object-fit:contain;object-position:center center;display:block;filter:grayscale(1);}
.quote-copy{position:relative;padding-right:8px;}
.slide-container .quote-mark{margin:0 0 10px;color:var(--ink-08);font-family:"Space Grotesk",sans-serif;font-size:120px;font-weight:900;line-height:0.75;}
.slide-container .quote-body{margin:0 0 48px;font-size:20px;font-weight:900;font-style:italic;line-height:1.5;letter-spacing:0.1px;}
.slide-container .quote-translation{margin:0 0 14px;font-size:28px;font-weight:900;line-height:1.7;color:rgba(0,0,0,0.8);}
.slide-container .quote-note{margin:0 0 18px;font-size:15px;color:rgba(0,0,0,0.46);line-height:1.6;}
.quote-summary{grid-column:1 / -1;padding:18px 28px;border-radius:8px;background:var(--ink-04);}
.quote-summary p{margin:0;font-size:20px;font-weight:900;line-height:1.8;text-align:center;}

</style>
</head>
<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第03章 問題解決の概要" data-header-title="アインシュタインの言葉" data-header-subtitle="正しく問いを理解すること/正しい問いを立てることが全て" data-footer="standard" data-footer-page="27">
<div class="quote-layout">
  <div class="quote-photo-frame">
    <img class="quote-photo" src="../assets/einstein_reference.jpg" alt="舌を出したアインシュタインのモノクロ写真"/>
  </div>
  <div class="quote-copy">
    <p class="quote-mark">“</p>
    <p class="quote-body">If I had an hour to solve a problem, I'd spend 55 minutes thinking about the problem and 5 minutes thinking about solutions.</p>
    <p class="quote-translation">もし地球を救うために1時間を与えられたなら、55分を問いの理解に使い、5分を打ち手の策定に使う。</p>
  </div>
</div>
</div>
</body>
</html>
