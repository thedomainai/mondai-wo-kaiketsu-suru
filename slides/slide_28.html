<title>現在地を掴み高速で行き来する</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>

<style>
.meta-wrap{position:absolute;left:120px;top:214px;width:1040px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}
.meta-card{min-height:154px;padding:22px 22px 20px;border:1px solid var(--ink-10);border-radius:8px;background:var(--surface-white)}
.meta-card__num,.meta-card__head{margin:0}
.meta-card__num{color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px}
.meta-card__head{font-size:24px;font-weight:900;line-height:1.45}
.meta-card__body{margin:0;font-size:15px;line-height:1.82;color:var(--ink-68)}
.meta-note{position:absolute;left:120px;top:556px;width:1040px;padding:16px 18px;border-radius:8px;background:var(--ink-04)}

<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第03章 問題解決の概要" data-header-title="現在地を掴み高速で行き来する" data-header-subtitle="プロセスの4要点" data-footer="standard" data-footer-page="28">
<div class="meta-wrap">
<section class="meta-card stack-card">
<div class="stack-card__head"><p class="meta-card__num">01</p><p class="meta-card__head">今どの段階にいるかを把握する</p></div>
<p class="meta-card__body">論点設定にいるのか、分解にいるのか、検証にいるのか。現在地が見えるだけで、次に考えるべきことが定まる。</p>
</section>
<section class="meta-card stack-card">
<div class="stack-card__head"><p class="meta-card__num">02</p><p class="meta-card__head">ステップを行き来してよい</p></div>
<p class="meta-card__body">現実の問題解決は一直線ではない。検証の途中で問いに戻ることも、分解の途中で制約を見直すことも普通に起こる。</p>
</section>
<section class="meta-card stack-card">
<div class="stack-card__head"><p class="meta-card__num">03</p><p class="meta-card__head">その時点の論点をはっきりさせる</p></div>
<p class="meta-card__body">その論点の定義を明確に定める。曖昧な用語や表現を明確化していくことで、迷いが減る。</p>
</section>
<section class="meta-card stack-card">
<div class="stack-card__head"><p class="meta-card__num">04</p><p class="meta-card__head">高速で回して学習する</p></div>
<p class="meta-card__body">一周ごとに精度を上げる。理屈として流れが見えているだけでも、難しい問題に直面したときの立ち尽くし方が変わる。</p>
</section>
</div>
</div>
