<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>合意の完成形</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.summary-stage{position:absolute;left:80px;top:176px;width:1120px;display:grid;grid-template-rows:auto auto auto;row-gap:22px}
.summary-hero{padding:26px 30px 24px;border:1px solid var(--ink-08);border-radius:8px;background:var(--surface-white)}
.summary-kicker{margin:0 0 14px;color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.summary-head{margin:0 0 14px;font-size:34px;font-weight:900;line-height:1.42;color:var(--soft-black)}
.summary-copy{margin:0;font-size:16px;line-height:1.82;color:rgba(0,0,0,.66)}
.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.summary-card{padding:22px 22px 20px;border:1px solid var(--ink-08);border-radius:8px;background:var(--surface-white)}
.summary-card__num{margin:0 0 12px;color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:900;letter-spacing:2px}
.summary-card__head{margin:0 0 10px;font-size:22px;font-weight:900;line-height:1.45;color:var(--soft-black)}
.summary-card__body{margin:0;font-size:14px;line-height:1.78;color:rgba(0,0,0,.64)}
.summary-bar{padding:16px 20px;border-top:1px solid var(--ink-10)}
.summary-bar p{margin:0;font-size:18px;font-weight:900;line-height:1.68;color:var(--soft-black)}
</style>
</head>
<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第04章 目的と制約に合意する" data-header-title="合意の完成形" data-header-subtitle="一文または一枚に固定して初めて合意になる" data-footer="standard" data-footer-page="35">
  <div class="summary-stage">
    <section class="summary-hero">
      <p class="summary-kicker">Agreement Shape</p>
      <p class="summary-head">目的と制約は、<br/>会話でなく形で残す</p>
      <p class="summary-copy">「何を達成するか」「何を守るか」がその場で共有された気になっていても、あとで簡単にずれる。だから一文または一枚に落とし、誰でも同じ前提に戻れる状態をつくる。</p>
    </section>

    <div class="summary-grid">
      <section class="summary-card">
        <p class="summary-card__num">01</p>
        <p class="summary-card__head">型</p>
        <p class="summary-card__body">目的 / 成功基準 / 期限 / 守る条件 / 使える資源 / スコープ外 / 意思決定者 を最低限そろえる。</p>
      </section>

      <section class="summary-card">
        <p class="summary-card__num">02</p>
        <p class="summary-card__head">Before</p>
        <p class="summary-card__body">採用を強化したい。</p>
      </section>

      <section class="summary-card">
        <p class="summary-card__num">03</p>
        <p class="summary-card__head">After</p>
        <p class="summary-card__body">半年で営業職の採用充足率を80%まで引き上げる。既存予算内で進め、現場工数を増やしすぎず、最終意思決定者は事業責任者とする。</p>
      </section>
    </div>
  </div>
</div>
</body>
</html>
