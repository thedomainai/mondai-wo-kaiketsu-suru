.principles-list{width:min(100%,960px);display:flex;flex-direction:column;gap:12px}
.principle-row{display:grid;grid-template-columns:72px 252px 1fr;gap:18px;align-items:center;padding:14px 0;border-top:1px solid rgba(0,0,0,.08)}

.principle-row__num{color:rgba(0,0,0,.34);font-family:"Space Grotesk",sans-serif;font-size:14px;font-weight:900;letter-spacing:2px}
.principle-row__title{font-size:22px;font-weight:900;line-height:1.45}

<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第05章 論点を分解する" data-header-title="論点分解における重要な5つのポイント" data-header-subtitle="構造を見失わず、次に何を考えるべきかを明らかにする分解を目指す" data-footer="standard" data-footer-page="36">
<div class="principles-wrap">
<div class="principles-list">
<div class="principle-row"><p class="principle-row__num">01</p><p class="principle-row__title">ツリー状に分解する</p><p class="principle-row__body">親から子へと階層を切り分け、どこで考えているかを明確にする。</p></div>
<div class="principle-row"><p class="principle-row__num">02</p><p class="principle-row__title">MECEに分解する</p><p class="principle-row__body">漏れなく、重複なく。下位要素で上位要素を説明しきれる形にする。</p></div>
<div class="principle-row"><p class="principle-row__num">03</p><p class="principle-row__title">モデル（式）で考える</p><p class="principle-row__body">四則演算や因果でつなぎ、どの変数を動かせば上位が変わるかを見えるようにする。</p></div>
<div class="principle-row"><p class="principle-row__num">04</p><p class="principle-row__title">1つを長く考えすぎない</p><p class="principle-row__body">進まないなら論点が違うか、まだ粗い。立ち止まって問いの置き方を見直す。</p></div>
<div class="principle-row"><p class="principle-row__num">05</p><p class="principle-row__title">上下を行き来する</p><p class="principle-row__body">トップダウンで構造を整え、ボトムアップで切り口を補う。両方を往復して磨く。</p></div>
</div>
