<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>問いの前に目的と制約を固める</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.summary-stage{position:absolute;left:80px;top:176px;width:1120px;display:grid;grid-template-rows:auto auto auto;row-gap:22px}
.summary-hero{padding:26px 30px 24px;border:1px solid var(--ink-08);border-radius:8px;background:var(--surface-white)}
.summary-kicker{margin:0 0 14px;color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.summary-head{margin:0 0 14px;font-size:34px;font-weight:900;line-height:1.42;color:var(--soft-black)}
.summary-copy{margin:0;font-size:16px;line-height:1.82;color:rgba(0,0,0,.66)}
.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.summary-card{padding:22px 22px 20px;border:1px solid var(--ink-08);border-radius:8px;background:var(--surface-white)}
.summary-card__num,.summary-card__head{margin:0}
.summary-card__num{color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:900;letter-spacing:2px}
.summary-card__head{font-size:22px;font-weight:900;line-height:1.45;color:var(--soft-black)}
.summary-card__body{margin:0;font-size:14px;line-height:1.78;color:rgba(0,0,0,.64)}
.summary-bar{padding:16px 20px;border-top:1px solid var(--ink-10)}
.summary-bar p{margin:0;font-size:18px;font-weight:900;line-height:1.68;color:var(--soft-black)}
</style>
</head>
<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第04章 目的と制約に合意する" data-header-title="問いの前に目的と制約を固める" data-header-subtitle="第04章まとめ" data-footer="standard" data-footer-page="36">
  <div class="summary-stage">
    <section class="summary-hero">
      <p class="summary-kicker">Chapter 04 Summary</p>
      <p class="summary-head">目的と制約を誤るれば後ろの工程は無価値になる</p>
      <p class="summary-copy">問いの前に、何を達成するためか、どんな条件下なのかを揃える。<br>目的と制約が固定されて初めて、後ろのプロセス（論点定義 / 分解 / 仮説構築）が同じ土俵で回る</p>
    </section>

    <div class="summary-grid">
      <section class="summary-card stack-card">
        <div class="stack-card__head"><p class="summary-card__num">01</p><p class="summary-card__head">目的を判断可能な形にする</p></div>
        <p class="summary-card__body stack-card__body">達成できたかを後から判定できる形まで目的を言語化する。抽象論のまま握らない。</p>
      </section>

      <section class="summary-card stack-card">
        <div class="stack-card__head"><p class="summary-card__num">02</p><p class="summary-card__head">制約を明示する</p></div>
        <p class="summary-card__body stack-card__body">時間、資源、ルール、権限を明らかにし、Hard と Soft を分けて握る。</p>
      </section>

      <section class="summary-card stack-card">
        <div class="stack-card__head"><p class="summary-card__num">03</p><p class="summary-card__head">合意を形成する</p></div>
        <p class="summary-card__body stack-card__body">会話で終わらせず、テキストに残す。後続工程の共通前提として立ち返る場所になる。</p>
      </section>
    </div>
  </div>
</div>
</body>
</html>
