<html lang="ja">
<head>

<title>原則4：5分以上考えない</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.five-wrap{position:absolute;left:80px;top:198px;width:1120px;display:grid;grid-template-columns:460px 1fr;gap:26px}
.five-left{display:flex;flex-direction:column;gap:16px}
.five-left__eyebrow{margin:0;color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px}
.five-left__head{margin:0;font-size:34px;font-weight:900;line-height:1.4}
.five-left__body{margin:0;font-size:16px;line-height:1.9;color:var(--ink-68)}
.five-right{display:flex;flex-direction:column;gap:14px}
.five-card{padding:18px 18px 16px;border:1px solid var(--ink-10);border-radius:8px;background:var(--surface-white)}
.five-card__eyebrow{margin:0 0 8px;color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px}
.five-card__head{margin:0 0 8px;font-size:18px;font-weight:900;line-height:1.55}
.five-card__body{margin:0;font-size:14px;line-height:1.76;color:var(--ink-68)}
.five-note{position:absolute;left:80px;top:612px;width:1120px;padding-top:14px;border-top:1px solid var(--ink-10)}

<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第06章 論点を分解する" data-header-title="原則4：5分以上考えない" data-header-subtitle="詰まるのは論点がずれているサインである" data-footer="standard" data-footer-page="48">
<div class="five-wrap">
<div class="five-left">
<p class="five-left__eyebrow">Signal</p>
<p class="five-left__head">1つの論点に詰まる場合<br/>その論点の置き方を疑う</p>
<p class="five-left__body">5〜10分考えても前に進まない場合、思考力の問題ではなく、見ている問いがずれているか、まだ粗すぎる可能性が高い。</p>
</div>
<div class="five-right">
<section class="five-card"><p class="five-card__eyebrow">Case 01</p><p class="five-card__head">論点が間違っている</p><p class="five-card__body">答えの出ない問いを握っていると、どれだけ考えても前に進まない。上位の問いに戻って定義し直す。</p></section>
<section class="five-card"><p class="five-card__eyebrow">Case 02</p><p class="five-card__head">まだ論点が粗すぎる</p><p class="five-card__body">1つの論点の中に複数の論点が混ざっている。さらに分解して、検証可能な単位まで小さくする。</p></section>
</div>
</div>
</div>
