<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>受け手の理解</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet"/>
<link href="./slides.css" rel="stylesheet"/>
<script defer src="./slides.js"></script>
<style>
.stage{position:absolute;left:80px;top:156px;width:1120px;display:flex;flex-direction:column;gap:18px}
.kicker{margin:0;color:var(--accent-purple);font-size:15px;font-weight:900;line-height:1.55}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
.card{min-height:180px;padding:22px;border:1px solid var(--ink-10);border-radius:8px;background:var(--surface-white)}
.card__label{margin:0 0 10px;color:var(--ink-34);font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.card__title{margin:0 0 10px;font-size:22px;font-weight:900;line-height:1.45}
.card__text{margin:0;color:rgba(0,0,0,.72);font-size:14px;line-height:1.72}
.summary{padding-top:14px;border-top:1px solid var(--ink-10)}
.summary p{margin:0;font-size:17px;font-weight:900;line-height:1.65}
</style>
</head>
<body>
<div class="slide-container slide-theme-paper" data-slide-kind="content" data-header-chapter="第09章 問題解決におけるコミュニケーション" data-header-title="受け手の理解" data-header-subtitle="相手の知識・理解力・関心を読む" data-footer="standard" data-footer-page="70">
  <div class="stage">
    <p class="kicker">同じ内容でも、誰に伝えるかで構造は変わる。相手の頭の中を先に読んでから設計する。</p>
    <div class="grid">
      <section class="card">
        <p class="card__label">Knowledge</p>
        <p class="card__title">相手の知識</p>
        <p class="card__text">何を知っていて、何を知らないか。同じ言葉でも前提が違えば、最初の理解からずれる。</p>
      </section>
      <section class="card">
        <p class="card__label">Capacity</p>
        <p class="card__title">相手の理解力</p>
        <p class="card__text">どこまで一気に追えるか。論理の段数、具体例の量、情報量の密度は相手に合わせて調整する。</p>
      </section>
      <section class="card">
        <p class="card__label">Interest</p>
        <p class="card__title">相手の興味関心</p>
        <p class="card__text">何に反応し、何を評価し、何を怖がるか。相手が先に知りたいことから並べる必要がある。</p>
      </section>
    </div>
    <div class="summary"><p>受け手理解は、相手が何を知っていて、どこまで追えて、何に関心を持つかを読むことである。</p></div>
  </div>
</div>
</body>
</html>
